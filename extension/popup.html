<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreatLens Scanner</title>
  <link href="tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; width: 340px; min-height: 200px; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* SVG gauge arc helper */
    .gauge-track { fill: none; stroke: #1e293b; stroke-width: 10; }
    .gauge-fill   { fill: none; stroke-width: 10; stroke-linecap: round;
                    transition: stroke-dashoffset 0.6s ease, stroke 0.4s ease; }
  </style>
</head>
<body class="bg-[#0f172a] text-[#f1f5f9]">

  <!-- Header -->
  <div class="flex items-center gap-2 px-4 pt-4 pb-3 border-b border-slate-700">
    <span class="text-xl">🛡</span>
    <div>
      <div class="text-sm font-bold text-white leading-none">ThreatLens Scanner</div>
      <div class="text-[10px] text-slate-400 mt-0.5">AI Phishing Protection</div>
    </div>
    <button id="rescan-btn"
      class="ml-auto text-[11px] px-3 py-1.5 rounded-md bg-slate-700 hover:bg-slate-600
             text-slate-300 hover:text-white transition-colors font-medium">
      ↺ Rescan
    </button>
  </div>

  <!-- Main Content -->
  <div id="content" class="px-4 py-4">

    <!-- Loading state -->
    <div id="state-loading" class="flex flex-col items-center justify-center py-6 gap-2 text-slate-400">
      <div class="w-5 h-5 border-2 border-slate-600 border-t-slate-300 rounded-full"
           style="animation: spin 0.8s linear infinite;"></div>
      <span class="text-xs">Loading last scan...</span>
    </div>

    <!-- No data state -->
    <div id="state-empty" class="hidden flex flex-col items-center justify-center py-6 gap-2 text-slate-500">
      <span class="text-2xl">📭</span>
      <span class="text-xs text-center">No scan yet.<br>Open an email in Gmail or Outlook.</span>
    </div>

    <!-- Result state -->
    <div id="state-result" class="hidden">

      <!-- Score Gauge + Verdict -->
      <div class="flex items-center gap-4 mb-4">

        <!-- SVG Gauge -->
        <div class="relative w-20 h-20 flex-shrink-0">
          <svg viewBox="0 0 80 80" class="w-20 h-20 -rotate-90">
            <circle cx="40" cy="40" r="32" class="gauge-track"/>
            <circle id="gauge-arc" cx="40" cy="40" r="32" class="gauge-fill"
              stroke-dasharray="201.1"
              stroke-dashoffset="201.1"/>
          </svg>
          <!-- Score number -->
          <div class="absolute inset-0 flex flex-col items-center justify-center rotate-0">
            <span id="gauge-score" class="text-xl font-bold leading-none text-white">—</span>
            <span class="text-[9px] text-slate-400">/100</span>
          </div>
        </div>

        <!-- Verdict + Meta -->
        <div class="flex-1 min-w-0">
          <div id="verdict-badge"
            class="inline-flex items-center gap-1.5 text-sm font-bold px-2.5 py-1 rounded-full mb-1.5">
          </div>
          <div id="client-label" class="text-[10px] text-slate-400 mb-0.5"></div>
          <div id="timestamp-label" class="text-[10px] text-slate-500"></div>
        </div>
      </div>

      <!-- Risk Flags -->
      <div id="flags-section" class="mb-3 hidden">
        <div class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">
          Risk Flags
        </div>
        <div id="flags-container" class="flex flex-wrap gap-1.5"></div>
      </div>

      <!-- Recommended Action -->
      <div id="action-section" class="hidden">
        <div class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-1">
          Recommended Action
        </div>
        <div id="action-text" class="text-xs text-slate-300 leading-relaxed"></div>
      </div>

    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
